spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/sgu
    username: postgres
    password: password

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        globally_quoted_identifiers: true
    jpa:
      show-sql: true

  flyway:
    enabled: true
    baseline-on-migrate: true

server:
  servlet:
    context-path: /api

logging:
  level:
    org.hibernate.SQL: DEBUG
